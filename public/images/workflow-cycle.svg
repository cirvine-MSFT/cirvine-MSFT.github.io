<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 245" fill="none">
  <defs>
    <marker id="arrow-fwd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 10,3.5 0,7" fill="#606080"/>
    </marker>
    <marker id="arrow-fb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 10,3.5 0,7" fill="#A855F7" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Research (sometimes) — dashed border to indicate optional -->
  <rect x="20" y="157" width="120" height="56" rx="6" fill="#1E1E3A" stroke="#A855F7" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="80" y="181" text-anchor="middle" fill="#E8E8F0" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Research</text>
  <text x="80" y="199" text-anchor="middle" fill="#606080" font-family="Inter,system-ui,sans-serif" font-size="11">(sometimes)</text>

  <!-- Plan -->
  <rect x="185" y="157" width="120" height="56" rx="6" fill="#1E1E3A" stroke="#A855F7" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="245" y="190" text-anchor="middle" fill="#E8E8F0" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Plan</text>

  <!-- Execute -->
  <rect x="350" y="157" width="120" height="56" rx="6" fill="#1E1E3A" stroke="#A855F7" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="410" y="190" text-anchor="middle" fill="#E8E8F0" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Execute</text>

  <!-- Nudge -->
  <rect x="515" y="157" width="120" height="56" rx="6" fill="#1E1E3A" stroke="#A855F7" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="575" y="190" text-anchor="middle" fill="#E8E8F0" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Nudge</text>

  <!-- Review -->
  <rect x="680" y="157" width="120" height="56" rx="6" fill="#1E1E3A" stroke="#A855F7" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="740" y="190" text-anchor="middle" fill="#E8E8F0" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600">Review</text>

  <!-- Goal diamond -->
  <polygon points="870,157 905,185 870,213 835,185" fill="#1E1E3A" stroke="#39FF14" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="870" y="190" text-anchor="middle" fill="#39FF14" fill-opacity="0.8" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Goal</text>

  <!-- Forward arrows -->
  <line x1="140" y1="185" x2="182" y2="185" stroke="#606080" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>
  <line x1="305" y1="185" x2="347" y2="185" stroke="#606080" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>
  <line x1="470" y1="185" x2="512" y2="185" stroke="#606080" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>
  <line x1="635" y1="185" x2="677" y2="185" stroke="#606080" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>
  <line x1="800" y1="185" x2="832" y2="185" stroke="#606080" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>

  <!-- Feedback arcs: Review back to Plan, Execute, Nudge -->
  <path d="M 710,157 C 710,40 245,40 245,157" stroke="#A855F7" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="6 3" fill="none" marker-end="url(#arrow-fb)"/>
  <path d="M 730,157 C 730,70 410,70 410,157" stroke="#A855F7" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="6 3" fill="none" marker-end="url(#arrow-fb)"/>
  <path d="M 750,157 C 750,100 575,100 575,157" stroke="#A855F7" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="6 3" fill="none" marker-end="url(#arrow-fb)"/>
</svg>
